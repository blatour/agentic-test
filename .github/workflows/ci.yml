name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint dependencies
        run: pip install flake8
      - name: Lint
        run: flake8 samples/ contracts/ --max-line-length=120

  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest jsonschema
      - name: Run contract tests
        run: python -m pytest tests/contract/ -v
      - name: Run loop harness tests
        run: python -m pytest tests/loop/ -v
      - name: Run replay tests
        run: python -m pytest tests/replay/ -v
      - name: Run unit tests
        run: python -m pytest tests/unit/ -v
